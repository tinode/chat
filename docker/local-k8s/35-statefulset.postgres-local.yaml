apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tinode
  namespace: default
  labels:
    app.kubernetes.io/name: tinode
spec:
  serviceName: tinode-headless
  replicas: 3
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: tinode
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tinode
    spec:
      serviceAccountName: tinode
      terminationGracePeriodSeconds: 30
      containers:
        - name: tinode
          image: tinode/tinode:k8s-postgres-local
          imagePullPolicy: Never
          ports:
            - name: ws
              containerPort: 6060
              protocol: TCP
            - name: grpc
              containerPort: 16060
              protocol: TCP
            - name: cluster
              containerPort: 12001
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: WAIT_FOR
              value: postgres:5432
            - name: EXT_CONFIG
              value: /opt/tinode/tinode.conf
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              export TINODE_WORKER_ID=$(( ${POD_NAME##*-} + 1 ))
              echo "tinode: POD_NAME=$POD_NAME TINODE_WORKER_ID=$TINODE_WORKER_ID"
              exec /opt/tinode/entrypoint.sh
          volumeMounts:
            - name: config
              mountPath: /opt/tinode/tinode.conf
              subPath: tinode.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: ws
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: ws
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: tinode-config-postgres
            items:
              - key: tinode.conf
                path: tinode.conf
